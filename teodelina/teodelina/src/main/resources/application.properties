spring.application.name=teodelina
# ----------------------------------------
# CONEXIÓN A LA BASE DE DATOS MYSQL
# ----------------------------------------
spring.datasource.url=jdbc:mysql://localhost:3307/teodelina_db?serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ----------------------------------------
# CONFIGURACIÓN DE JPA / HIBERNATE (La Magia)
# ----------------------------------------
# "update" le dice a Spring que cree las tablas automáticamente si no existen
spring.jpa.hibernate.ddl-auto=update
# Muestra en la consola las consultas SQL que hace por detrás (muy útil para aprender)
spring.jpa.show-sql=true

# Credenciales fijas para Spring Security
spring.security.user.name=admin
spring.security.user.password=admin123

google.gemini.api.key=${GEMINI_API_KEY}

